apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stayzennnn/my-minecraft-server.git
    targetRevision: HEAD
    path: charts/exporter
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true